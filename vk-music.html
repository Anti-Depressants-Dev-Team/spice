<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spice Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ============= RESET & GLOBALS ============= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            font-family: 'Roboto', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #141414;
            color: #e1e3e6;
            overflow: hidden;
            user-select: none;
        }

        /* ============= LAYOUT ============= */
        .app {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 48px 50px 1fr;
            grid-template-areas:
                "topbar"
                "player"
                "main";
            width: 100%;
            height: 100%;
        }

        .topbar {
            grid-area: topbar;
        }

        .player-bar {
            grid-area: player;
        }

        .main-area {
            grid-area: main;
            display: grid;
            grid-template-columns: 180px 1fr;
            overflow: hidden;
        }



        /* ============= TOPBAR ============= */
        .topbar {
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
        }

        .topbar-search {
            flex: 0 1 320px;
            position: relative;
        }

        .topbar-search .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #656565;
            font-size: 14px;
            pointer-events: none;
        }

        .topbar-search input {
            width: 100%;
            padding: 7px 12px 7px 32px;
            background: #252525;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #e1e3e6;
            font-size: 13px;
            outline: none;
            font-family: inherit;
        }

        .topbar-search input:focus {
            border-color: #0077FF;
        }

        .topbar-search input::placeholder {
            color: #656565;
        }

        .topbar-spacer {
            flex: 1;
        }

        .topbar-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #939699;
            font-size: 18px;
            transition: background 0.15s;
            border: none;
            background: none;
        }

        .topbar-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #e1e3e6;
        }

        .topbar-close:hover {
            background: #e81123 !important;
            color: #fff !important;
        }

        /* ============= PLAYER BAR ============= */
        .player-bar {
            background: #1e1e1e;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 6px;
        }

        .ctrl-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: transparent;
            color: #939699;
            font-size: 18px;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s, color 0.15s;
        }

        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #e1e3e6;
        }

        .ctrl-btn.active {
            color: #0077FF;
        }

        .ctrl-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .play-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #0077FF;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s;
        }

        .play-btn:hover {
            background: #1a88ff !important;
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 0 1 240px;
            overflow: hidden;
            margin-left: 8px;
        }

        .track-art {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            object-fit: cover;
            background: #333;
            flex-shrink: 0;
            display: none;
        }

        .track-text {
            overflow: hidden;
            min-width: 0;
        }

        .track-title {
            font-size: 13px;
            color: #e1e3e6;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist {
            font-size: 12px;
            color: #939699;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .like-btn {
            font-size: 18px;
            font-weight: 300;
        }

        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            margin: 0 8px;
        }

        .time-label {
            font-size: 11px;
            color: #656565;
            min-width: 32px;
        }

        .time-left {
            text-align: right;
        }

        .progress-bg {
            flex: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: #0077FF;
            border-radius: 2px;
            width: 0%;
            pointer-events: none;
            transition: width 0.3s linear;
        }

        .vol-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .vol-slider {
            width: 80px;
            height: 4px;
            cursor: pointer;
            accent-color: #0077FF;
        }

        /* ============= SIDEBAR ============= */
        .sidebar {
            background: #1a1a1a;
            border-right: 1px solid #2a2a2a;
            overflow-y: auto;
            padding: 12px 0;
        }

        .sidebar::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 2px;
        }

        .sidebar-section {
            margin-bottom: 16px;
        }

        .sidebar-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #656565;
            padding: 4px 16px 6px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            cursor: pointer;
            color: #939699;
            font-size: 13px;
            transition: background 0.12s, color 0.12s;
            white-space: nowrap;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #e1e3e6;
        }

        .nav-item.active {
            color: #0077FF;
            background: rgba(0, 119, 255, 0.08);
        }

        .nav-item svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            flex-shrink: 0;
        }

        /* ============= CONTENT AREA ============= */
        .content-area {
            background: #191919;
            overflow-y: auto;
            padding: 20px 24px;
        }

        .content-area::-webkit-scrollbar {
            width: 6px;
        }

        .content-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .content-area::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        .content-area::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        /* Music search in content area */
        .content-search {
            margin-bottom: 20px;
        }

        .content-search input {
            width: 100%;
            max-width: 480px;
            padding: 8px 14px;
            background: #252525;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #e1e3e6;
            font-size: 13px;
            outline: none;
            font-family: inherit;
        }

        .content-search input:focus {
            border-color: #0077FF;
        }

        .content-search input::placeholder {
            color: #656565;
        }

        /* Section headers */
        .section-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 8px;
        }

        .section-header h3 {
            font-size: 15px;
            font-weight: 500;
            color: #e1e3e6;
        }

        /* Genre chips */
        .genre-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        .genre-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #222;
            border: 1px solid #2a2a2a;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.15s;
            color: #e1e3e6;
            font-size: 13px;
        }

        .genre-chip:hover {
            background: #2a2a2a;
            border-color: #444;
        }

        .genre-chip .genre-play {
            width: 24px;
            height: 24px;
            background: #0077FF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #fff;
        }

        /* Now Playing indicator */
        .now-playing {
            display: none;
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .now-playing.visible {
            display: block;
        }

        .now-playing-header {
            font-size: 12px;
            color: #656565;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .now-playing-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .now-playing-art {
            width: 56px;
            height: 56px;
            border-radius: 6px;
            background: #333;
            object-fit: cover;
        }

        .now-playing-text h4 {
            font-size: 15px;
            font-weight: 400;
            color: #e1e3e6;
        }

        .now-playing-text p {
            font-size: 13px;
            color: #939699;
            margin-top: 2px;
        }

        .now-playing-eq {
            margin-left: auto;
            display: flex;
            gap: 2px;
            align-items: flex-end;
            height: 20px;
        }

        .eq-bar {
            width: 3px;
            background: #0077FF;
            border-radius: 1px;
            animation: eq 0.8s ease-in-out infinite alternate;
        }

        .eq-bar:nth-child(1) {
            height: 8px;
            animation-delay: 0s;
        }

        .eq-bar:nth-child(2) {
            height: 16px;
            animation-delay: 0.2s;
        }

        .eq-bar:nth-child(3) {
            height: 10px;
            animation-delay: 0.4s;
        }

        .eq-bar:nth-child(4) {
            height: 14px;
            animation-delay: 0.1s;
        }

        @keyframes eq {
            from {
                height: 4px;
            }

            to {
                height: 20px;
            }
        }

        /* ============= SEARCH RESULTS ============= */
        .search-results {
            display: none;
            margin-bottom: 20px;
        }

        .search-results.visible {
            display: block;
        }

        .search-results-header {
            font-size: 15px;
            font-weight: 500;
            color: #e1e3e6;
            margin-bottom: 12px;
        }

        .search-loading {
            color: #656565;
            font-size: 13px;
            padding: 20px 0;
        }

        .result-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.12s;
        }

        .result-row:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .result-row .result-art {
            width: 44px;
            height: 44px;
            border-radius: 4px;
            background: #333;
            object-fit: cover;
            flex-shrink: 0;
        }

        .result-row .result-text {
            flex: 1;
            min-width: 0;
        }

        .result-row .result-title {
            font-size: 14px;
            color: #e1e3e6;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .result-row .result-artist {
            font-size: 12px;
            color: #939699;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .result-row .result-play {
            width: 32px;
            height: 32px;
            background: #0077FF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #fff;
            flex-shrink: 0;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .result-row:hover .result-play {
            opacity: 1;
        }

        /* ============= PLAYLISTS ============= */
        .playlists-section {
            margin-bottom: 20px;
        }

        .playlists-header {
            font-size: 15px;
            font-weight: 500;
            color: #e1e3e6;
            margin-bottom: 12px;
        }

        .playlists-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        .playlist-card {
            background: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }

        .playlist-card:hover {
            background: #282828;
            transform: translateY(-2px);
        }

        .playlist-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            background: #333;
        }

        .playlist-card .pl-info {
            padding: 8px 10px;
        }

        .playlist-card .pl-title {
            font-size: 13px;
            color: #e1e3e6;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .playlist-card .pl-subtitle {
            font-size: 11px;
            color: #656565;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>

<body>
    <div class="app">


        <!-- TOPBAR -->
        <div class="topbar">
            <div class="topbar-search">
                <span class="search-icon">🔍</span>
                <input type="text" placeholder="Search" id="topbar-search-input">
            </div>
            <div class="topbar-spacer" style="-webkit-app-region: drag;"></div>
            <button class="topbar-btn" id="btn-lyrics" title="Lyrics">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                    <path
                        d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zM6 20V4h7v5h5v11H6zm2-6h8v2H8v-2zm0-3h8v2H8v-2z" />
                </svg>
            </button>
            <button class="topbar-btn" id="btn-settings" title="Settings">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                    <path
                        d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" />
                </svg>
            </button>
            <button class="topbar-btn" id="btn-minimize" title="Minimize">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                    <path d="M6 19h12v2H6z" />
                </svg>
            </button>
            <button class="topbar-btn" id="btn-maximize" title="Maximize">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                    <path d="M4 4h16v16H4V4zm2 2v12h12V6H6z" />
                </svg>
            </button>
            <button class="topbar-btn topbar-close" id="btn-close" title="Close">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                    <path
                        d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
                </svg>
            </button>
        </div>

        <!-- PLAYER BAR -->
        <div class="player-bar">
            <button class="ctrl-btn" id="btn-prev" title="Previous">⏮</button>
            <button class="play-btn" id="btn-play" title="Play">▶</button>
            <button class="ctrl-btn" id="btn-next" title="Next">⏭</button>
            <button class="ctrl-btn" id="btn-shuffle" title="Shuffle"><svg viewBox="0 0 24 24">
                    <path
                        d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z" />
                </svg></button>
            <button class="ctrl-btn" id="btn-repeat" title="Repeat"><svg viewBox="0 0 24 24">
                    <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z" />
                </svg></button>

            <div class="track-info">
                <img class="track-art" id="track-art" src="">
                <div class="track-text">
                    <div class="track-title" id="track-title">No track playing</div>
                    <div class="track-artist" id="track-artist"></div>
                </div>
            </div>

            <button class="ctrl-btn like-btn" id="btn-like" title="Like">+</button>

            <div class="progress-wrap">
                <span class="time-label time-left" id="time-current">0:00</span>
                <div class="progress-bg" id="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <span class="time-label" id="time-duration">0:00</span>
            </div>

            <div class="vol-wrap">
                <button class="ctrl-btn" id="btn-vol" title="Volume" style="font-size:14px;">🔊</button>
                <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="100">
            </div>
        </div>

        <!-- MAIN AREA (sidebar + content) -->
        <div class="main-area">
            <!-- SIDEBAR -->
            <div class="sidebar">
                <div class="sidebar-section">
                    <div class="nav-item active" data-nav="home">
                        <svg viewBox="0 0 24 24">
                            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
                        </svg>
                        <span>Home</span>
                    </div>
                    <div class="nav-item" data-nav="explore">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M12 10.9c-.61 0-1.1.49-1.1 1.1s.49 1.1 1.1 1.1c.61 0 1.1-.49 1.1-1.1s-.49-1.1-1.1-1.1zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm2.19 12.19L6 18l3.81-8.19L18 6l-3.81 8.19z" />
                        </svg>
                        <span>Explore</span>
                    </div>
                    <div class="nav-item" data-nav="charts">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z" />
                        </svg>
                        <span>Charts</span>
                    </div>
                    <div class="nav-item" data-nav="new_releases">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 12.5c-3.03 0-5.5-2.47-5.5-5.5S8.97 5.5 12 5.5s5.5 2.47 5.5 5.5-2.47 5.5-5.5 5.5zm0-9c-1.93 0-3.5 1.57-3.5 3.5s1.57 3.5 3.5 3.5 3.5-1.57 3.5-3.5-1.57-3.5-3.5-3.5z" />
                        </svg>
                        <span>New releases</span>
                    </div>
                </div>
                <div class="sidebar-section">
                    <div class="sidebar-label">Library</div>
                    <div class="nav-item" data-nav="liked">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
                        </svg>
                        <span>Liked songs</span>
                    </div>
                    <div class="nav-item" data-nav="playlists">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z" />
                        </svg>
                        <span>Playlists</span>
                    </div>
                    <div class="nav-item" data-nav="albums">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z" />
                        </svg>
                        <span>Albums</span>
                    </div>
                    <div class="nav-item" data-nav="artists">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                        </svg>
                        <span>Artists</span>
                    </div>
                    <div class="nav-item" data-nav="history">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z" />
                        </svg>
                        <span>History</span>
                    </div>
                </div>
            </div>

            <!-- CONTENT AREA -->
            <div class="content-area">
                <!-- Music Search -->
                <div class="content-search">
                    <input type="text" placeholder="Search music" id="music-search-input">
                </div>

                <!-- Search Results -->
                <div class="search-results" id="search-results">
                    <div class="search-results-header" id="search-results-header">Search Results</div>
                    <div id="search-results-list"></div>
                </div>

                <!-- Playlists -->
                <div class="playlists-section" id="playlists-section">
                    <div class="playlists-header">Your Playlists</div>
                    <div class="playlists-grid" id="playlists-grid">
                        <div class="search-loading">Loading playlists...</div>
                    </div>
                </div>

                <!-- Now Playing Card -->
                <div class="now-playing" id="now-playing">
                    <div class="now-playing-header">NOW PLAYING</div>
                    <div class="now-playing-content">
                        <img class="now-playing-art" id="np-art" src="">
                        <div class="now-playing-text">
                            <h4 id="np-title">—</h4>
                            <p id="np-artist">—</p>
                        </div>
                        <div class="now-playing-eq">
                            <div class="eq-bar"></div>
                            <div class="eq-bar"></div>
                            <div class="eq-bar"></div>
                            <div class="eq-bar"></div>
                        </div>
                    </div>
                </div>

                <!-- Genres -->
                <div class="section-header">
                    <h3>Genres</h3>
                </div>
                <div class="genre-row">
                    <div class="genre-chip" data-genre="pop"><span class="genre-play">▶</span><span>Pop</span></div>
                    <div class="genre-chip" data-genre="hip hop"><span class="genre-play">▶</span><span>Hip-hop</span>
                    </div>
                    <div class="genre-chip" data-genre="rock"><span class="genre-play">▶</span><span>Rock</span></div>
                    <div class="genre-chip" data-genre="electronic"><span
                            class="genre-play">▶</span><span>Electronic</span>
                    </div>
                    <div class="genre-chip" data-genre="indie"><span class="genre-play">▶</span><span>Indie</span></div>
                    <div class="genre-chip" data-genre="r&b"><span class="genre-play">▶</span><span>R&B</span></div>
                    <div class="genre-chip" data-genre="jazz"><span class="genre-play">▶</span><span>Jazz</span></div>
                    <div class="genre-chip" data-genre="classical"><span
                            class="genre-play">▶</span><span>Classical</span>
                    </div>
                </div>

                <!-- Status message -->
                <div style="text-align:center; color:#656565; font-size:12px; margin-top:20px;">
                    Powered by YouTube Music
                </div>
            </div> <!-- content-area -->
        </div> <!-- main-area -->
    </div>

    <script>
        // ============= SIDEBAR NAVIGATION =============
        const NAV_MAP = {
            home: '/',
            explore: '/explore',
            library: '/library',
            playlists: '/library/playlists',
            liked: '/playlist?list=LM',
            albums: '/library/albums',
            artists: '/library/artists',
            history: '/history',
            charts: '/charts',
            new_releases: '/new_releases',
        };

        document.querySelectorAll('.nav-item[data-nav]').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                const path = NAV_MAP[item.dataset.nav];
                if (path) window.api.vkCommand('navigate', { path });
            });
        });

        // ============= TOPBAR BUTTONS =============
        document.getElementById('btn-lyrics').addEventListener('click', () => window.api.openLyrics());
        document.getElementById('btn-settings').addEventListener('click', () => window.api.openSettings());
        document.getElementById('btn-minimize').addEventListener('click', () => window.api.minimizeWindow());
        document.getElementById('btn-maximize').addEventListener('click', () => window.api.maximizeWindow());
        document.getElementById('btn-close').addEventListener('click', () => window.api.closeWindow());

        // ============= PLAYER STATE =============
        let isPlaying = false;
        let currentDuration = 0;

        // ============= PLAYER CONTROLS =============
        document.getElementById('btn-play').addEventListener('click', () => {
            window.api.vkCommand('play-pause');
        });
        document.getElementById('btn-prev').addEventListener('click', () => {
            window.api.vkCommand('prev');
        });
        document.getElementById('btn-next').addEventListener('click', () => {
            window.api.vkCommand('next');
        });
        document.getElementById('btn-shuffle').addEventListener('click', () => {
            window.api.vkCommand('shuffle');
        });
        document.getElementById('btn-repeat').addEventListener('click', () => {
            window.api.vkCommand('repeat');
        });
        document.getElementById('btn-like').addEventListener('click', () => {
            window.api.vkCommand('like');
        });
        document.getElementById('btn-vol').addEventListener('click', () => {
            window.api.vkCommand('toggle-mute');
        });

        // Volume slider
        document.getElementById('vol-slider').addEventListener('input', (e) => {
            window.api.vkCommand('volume', { value: parseInt(e.target.value) / 100 });
        });

        // Progress bar seek
        document.getElementById('progress-bar').addEventListener('click', (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            window.api.vkCommand('seek', { percent: pct });
        });

        // ============= SEARCH =============
        let searchTimeout = null;
        function doSearch(query) {
            if (!query.trim()) return;
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                // Show loading state
                const resultsDiv = document.getElementById('search-results');
                resultsDiv.classList.add('visible');
                document.getElementById('search-results-header').textContent = 'Searching...';
                document.getElementById('search-results-list').innerHTML = '<div class="search-loading">Loading results...</div>';
                window.api.vkCommand('search', { query: query.trim() });
            }, 300);
        }

        document.getElementById('topbar-search-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doSearch(e.target.value);
        });
        document.getElementById('music-search-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doSearch(e.target.value);
        });

        // Genre chips → search
        document.querySelectorAll('.genre-chip[data-genre]').forEach(chip => {
            chip.addEventListener('click', () => {
                const genre = chip.dataset.genre;
                doSearch(genre);
            });
        });

        // ============= RECEIVE TRACK UPDATES =============
        function fmtTime(s) {
            if (!s || isNaN(s)) return '0:00';
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return m + ':' + (sec < 10 ? '0' : '') + sec;
        }

        window.api.onTrackUpdate((data) => {
            if (!data) return;

            // Player bar
            if (data.title) {
                document.getElementById('track-title').textContent = data.title;
                document.getElementById('np-title').textContent = data.title;
            }
            if (data.artist) {
                document.getElementById('track-artist').textContent = data.artist;
                document.getElementById('np-artist').textContent = data.artist;
            }
            if (data.art) {
                const artEl = document.getElementById('track-art');
                artEl.src = data.art;
                artEl.style.display = 'block';
                document.getElementById('np-art').src = data.art;
            }
            if (data.title || data.artist) {
                document.getElementById('now-playing').classList.add('visible');
            }
        });

        window.api.onProgressUpdate((data) => {
            if (!data) return;

            if (typeof data.playing === 'boolean') {
                isPlaying = data.playing;
                document.getElementById('btn-play').textContent = isPlaying ? '⏸' : '▶';

                // Toggle EQ bars animation
                const eqBars = document.querySelectorAll('.eq-bar');
                eqBars.forEach(bar => {
                    bar.style.animationPlayState = isPlaying ? 'running' : 'paused';
                });
            }

            if (data.currentTime !== undefined && data.duration !== undefined && data.duration > 0) {
                currentDuration = data.duration;
                const pct = (data.currentTime / data.duration) * 100;
                document.getElementById('progress-fill').style.width = pct + '%';
                document.getElementById('time-current').textContent = fmtTime(data.currentTime);
                document.getElementById('time-duration').textContent = fmtTime(data.duration);
            }

            if (data.volume !== undefined) {
                document.getElementById('vol-slider').value = Math.round(data.volume * 100);
            }

            // Update shuffle/repeat button states
            const shuffleBtn = document.getElementById('btn-shuffle');
            if (data.shuffle !== undefined) {
                shuffleBtn.classList.toggle('active', data.shuffle);
            }

            const repeatBtn = document.getElementById('btn-repeat');
            if (data.repeat !== undefined) {
                if (data.repeat === 'one') {
                    repeatBtn.classList.add('active');
                    repeatBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/><text x="13" y="16.5" font-size="7" font-weight="bold" fill="currentColor" text-anchor="middle">1</text></svg>';
                } else if (data.repeat === 'all') {
                    repeatBtn.classList.add('active');
                    repeatBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>';
                } else {
                    repeatBtn.classList.remove('active');
                    repeatBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>';
                }
            }
        });

        // ============= CONTENT UPDATES (search + playlists) =============
        window.api.onContentUpdate((data) => {
            if (!data) return;

            if (data.type === 'search') {
                const listEl = document.getElementById('search-results-list');
                const resultsDiv = document.getElementById('search-results');
                const headerEl = document.getElementById('search-results-header');

                if (!data.results || data.results.length === 0) {
                    resultsDiv.classList.add('visible');
                    headerEl.textContent = 'Search Results';
                    listEl.innerHTML = '<div class="search-loading">No results found. Try a different search.</div>';
                    return;
                }

                resultsDiv.classList.add('visible');
                headerEl.textContent = `Search Results (${data.results.length})`;
                listEl.innerHTML = '';

                data.results.forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'result-row';
                    row.innerHTML = `
                        <img class="result-art" src="${item.art || ''}" onerror="this.style.visibility='hidden'">
                        <div class="result-text">
                            <div class="result-title">${item.title}</div>
                            <div class="result-artist">${item.artist || ''}</div>
                        </div>
                        <div class="result-play">▶</div>
                    `;
                    row.addEventListener('click', () => {
                        window.api.vkCommand('play-result', { videoId: item.videoId, index: item.index });
                    });
                    listEl.appendChild(row);
                });
            }

            if (data.type === 'playlists') {
                const grid = document.getElementById('playlists-grid');
                if (!data.playlists || data.playlists.length === 0) {
                    grid.innerHTML = '<div class="search-loading">No playlists found.</div>';
                    return;
                }
                grid.innerHTML = '';
                data.playlists.forEach(pl => {
                    const card = document.createElement('div');
                    card.className = 'playlist-card';
                    card.innerHTML = `
                        <img src="${pl.art || ''}" onerror="this.style.background='#333'">
                        <div class="pl-info">
                            <div class="pl-title">${pl.title}</div>
                            <div class="pl-subtitle">${pl.subtitle || ''}</div>
                        </div>
                    `;
                    card.addEventListener('click', () => {
                        window.api.vkCommand('play-playlist', { playlistId: pl.playlistId });
                    });
                    grid.appendChild(card);
                });
            }
        });

        // ============= AUTO-LOAD PLAYLISTS =============
        setTimeout(() => {
            window.api.vkCommand('load-playlists');
        }, 3000); // Wait for YT Music backend to initialize
    </script>
</body>

</html>
