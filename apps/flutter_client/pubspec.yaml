name: spice
description: "Spice multi-platform music client"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Spice's own packages
  source_api:
    path: ../../packages/source_api
  source_youtube:
    path: ../../packages/source_youtube

  # Audio. just_audio handles the player API; `just_audio_media_kit` routes
  # playback through libmpv on Windows/Linux/macOS where just_audio's default
  # backends are weak. `media_kit_libs_audio` bundles the native libmpv binary.
  just_audio: ^0.9.40
  just_audio_media_kit: ^2.0.0
  media_kit_libs_audio: ^1.0.0
  audio_service: ^0.18.0
  audio_session: ^0.1.0

  # State / routing
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0

  # Local persistence
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.0
  path: ^1.9.0
  path_provider: ^2.1.0
  shared_preferences: ^2.3.0
  # flutter_secure_storage: added back when Phase 4 needs JWT/cookie storage.
  # Pinned out for now because its Windows plugin doesn't build cleanly with
  # VS Build Tools 2026 + our current Flutter version.

  # Networking
  http: ^1.0.0
  dio: ^5.7.0

  # IDs
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  drift_dev: ^2.20.0

flutter:
  uses-material-design: true
