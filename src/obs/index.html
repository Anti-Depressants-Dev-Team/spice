<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Spice OBS Widget</title>
        <link rel="stylesheet" href="styles.css" />
    </head>

    <body>
        <div class="background" id="bg-art"></div>
        <div class="container">
            <div class="info-area">
                <img src="" alt="Album Art" id="album-art" class="art hidden" />
                <div class="text-info">
                    <h2 id="track-title">Not Playing</h2>
                    <h3 id="track-artist">Spice</h3>
                </div>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
