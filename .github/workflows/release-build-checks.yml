name: Release Build Checks

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: release-build-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wrapper-linux-rpm:
    name: Classic wrapper RPM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Linux package tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install Dependencies
        run: npm ci

      - name: Test desktop release configuration
        run: npm test

      - name: Build classic wrapper RPM
        run: npx electron-builder --linux rpm --publish never

  native-windows:
    name: Windows Native package
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Prepare published Windows runtime
        shell: pwsh
        run: |
          $env:SPICE_BACKEND_REPO = Join-Path $env:RUNNER_TEMP 'missing-backend'
          $env:SPICE_NATIVE_TARGET_PLATFORM = 'win32'
          npm run native:prepare-runtime

      - name: Package Windows Native app
        run: npx electron-builder --win --dir --config electron-builder.native.cjs

  android-release:
    name: Android release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK Packages
        run: sdkmanager 'platforms;android-36' 'platform-tools' 'build-tools;36.0.0'

      - name: Build Android release APK
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false
        run: |
          chmod +x apps/mobile/android/gradlew
          bash apps/mobile/scripts/android-release-ci.sh

      - name: Verify APK signature
        run: "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose apps/mobile/android/app/build/outputs/apk/release/app-release.apk
