name: Release Spice Native

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  prepare-native-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Ensure GitHub Release Exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          gh release view "$VERSION" || gh release create "$VERSION" --target "$GITHUB_SHA" --title "$VERSION" --generate-notes

  build-native-windows:
    needs: prepare-native-release
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install unified workspace
        run: npm ci

      - name: Build & Publish Native Release
        run: npm run dist:native:windows -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-native-linux:
    needs: prepare-native-release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install Linux package tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install unified workspace
        run: npm ci

      - name: Build & Publish Native Linux Release
        run: npm run dist:native:linux -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
