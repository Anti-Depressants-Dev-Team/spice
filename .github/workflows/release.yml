name: Release Spice

on:
  push:
    tags:
      - 'v*' # Trigger automatically when a tag starting with 'v' is pushed (e.g., v1.0.1)
  workflow_dispatch: # Allows you to manually trigger the workflow from the Actions tab

jobs:
  prepare-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Ensure GitHub Release Exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          gh release view "$VERSION" || gh release create "$VERSION" --target "$GITHUB_SHA" --title "$VERSION" --generate-notes

  build:
    needs: prepare-release
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    # This grants the workflow permission to create a GitHub Release and upload files
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools libdbus-1-dev flatpak flatpak-builder elfutils
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install Dependencies
        run: npm install

      # Builds and publishes depending on the runner OS
      - name: Build & Publish Release (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Publish Release (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Publish Release (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mobile-android:
    name: Build & Upload Android Release
    needs: prepare-release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK Packages
        run: sdkmanager "platforms;android-36" "platform-tools"

      - name: Decode Android Signing Key
        env:
          SPICE_ANDROID_KEYSTORE_BASE64: ${{ secrets.SPICE_ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$SPICE_ANDROID_KEYSTORE_BASE64" ]; then
            mkdir -p apps/mobile/android/app/signing
            printf '%s' "$SPICE_ANDROID_KEYSTORE_BASE64" | base64 --decode > apps/mobile/android/app/signing/release.jks
          fi

      - name: Build Android Release APK
        env:
          SPICE_ANDROID_SIGNING_STORE_FILE: ${{ github.workspace }}/apps/mobile/android/app/signing/release.jks
          SPICE_ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.SPICE_ANDROID_KEYSTORE_PASSWORD }}
          SPICE_ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.SPICE_ANDROID_KEY_ALIAS }}
          SPICE_ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.SPICE_ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x apps/mobile/android/gradlew
          npm --prefix apps/mobile run android:release:ci

      - name: Stage Android Release APK
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          SIGNED_APK="apps/mobile/android/app/build/outputs/apk/release/app-release.apk"
          ASSET_DIR="dist-mobile"
          if [ -f "$SIGNED_APK" ]; then
            APK="$SIGNED_APK"
            SIGNING_KIND="signed"
          else
            echo "Expected signed release APK not found."
            find apps/mobile/android/app/build/outputs/apk/release -type f -maxdepth 3 || true
            find apps/mobile/android/app/build/outputs -type f || true
            exit 1
          fi
          ASSET="$ASSET_DIR/Spice-Android-${VERSION}-release-${SIGNING_KIND}.apk"
          if [ ! -f "$APK" ]; then
            echo "Expected release APK not found at $APK"
            find apps/mobile/android/app/build/outputs -type f || true
            exit 1
          fi
          mkdir -p "$ASSET_DIR"
          cp "$APK" "$ASSET"

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spice-android-release-apk
          path: dist-mobile/*.apk
          if-no-files-found: error

      - name: Upload Android APK To GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          gh release upload "$VERSION" dist-mobile/*.apk --clobber
