            },
        }

    <!-- React 18 (Production) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- htm — JSX-like tagged templates (3KB, no build step) -->

    <!-- Spice Theme -->
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div id="root"></div>

    <script>
    // ================================================================
    //  Spice 3 — Obsidian Purple
    //  A React-based remote control for the Spice music engine.
    //  Communicates with the Electron main process via window.api (IPC)
    //  with a fetch-based browser fallback for remote/web access.
    // ================================================================

    // ── Library Guard ────────────────────────────────────────────
    if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
        document.getElementById('root').innerHTML =
            '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#666;font-family:Inter,sans-serif">' +
            '<p>Loading Spice UI… Please check your internet connection.</p></div>';
        throw new Error('React not loaded');
    }

    const html = (typeof htm !== 'undefined' ? htm : window.htm).bind(React.createElement);
    const { useState, useEffect, useRef, useCallback } = React;

    // ── Helpers ──────────────────────────────────────────────────

    function fmtTime(s) {
        if (!s || isNaN(s) || s < 0) return '0:00';
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    async function callApi(action) {
        var args = Array.prototype.slice.call(arguments, 1);

        // 1. Electron IPC (primary)
        if (window.api) {
            switch (action) {
                case 'loadService':    return window.api.loadService(args[0]);
                case 'navigate':       return window.api.navigate(args[0]);
                case 'openSettings':   return window.api.openSettings();
                case 'setVolume':      return window.api.setVolume(args[0]);
                case 'getVolume':      return window.api.getVolume();
                case 'loadUrl':        return window.api.loadUrl(args[0]);
                case 'hideView':       return window.api.hideView();
                case 'showView':       return window.api.showView();
                case 'toggleVolume':   return window.api.toggleVolume();
                case 'openLyrics':     return window.api.openLyrics();
                case 'openMiniPlayer': return window.api.openMiniPlayer();
                case 'openQueue':      return window.api.openQueue();
                case 'openDevTools':   return window.api.openDevTools();
                case 'getNowPlaying':  return window.api.getNowPlaying();
                case 'executeSearch':  return window.api.executeSearch(args[0]);
                case 'getTopBarSearch': return window.api.getTopBarSearch();
                case 'vkCommand':      return window.api.vkCommand(args[0]);
                case 'checkForUpdates': return window.api.checkForUpdates();
                case 'installUpdate':  return window.api.installUpdate();
                case 'windowControls':
                    if (args[0] === 'minimize') return window.api.windowControls.minimize();
                    if (args[0] === 'maximize') return window.api.windowControls.maximize();
                    if (args[0] === 'close')    return window.api.windowControls.close();
                    break;
            }
        }

        // 2. Browser/Remote fallback (fetch-based)
        var serverAction = action;
        var body = {};

        if (action === 'vkCommand') {
            var cmd = args[0];
            if (typeof cmd === 'string') { serverAction = cmd; }
            else if (typeof cmd === 'object') { serverAction = cmd.action; body = cmd; }
        } else if (action === 'setVolume') {
            serverAction = 'volume';
            body = { value: args[0] };
        } else if (action === 'loadService') {
            serverAction = 'loadService';
            body = { service: args[0] };
        }

        try {
            var response = await fetch('/api/control', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: serverAction, ...body }),
            });
            return await response.json();
        } catch (err) {
            console.error('Remote API Error:', err);
            return null;
        }
    }

    // ── SVG Icon Helper ─────────────────────────────────────────

    function icon(d, s) {
        s = s || 16;
        var paths = Array.isArray(d) ? d : [d];
        return html`<svg width=${s} height=${s} viewBox="0 0 24 24" fill="currentColor">
            ${paths.map(function(p, i) { return html`<path key=${i} d=${p} />`; })}
        </svg>`;
    }

        volX:        'M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z',
        minimize:    'M19 13H5v-2h14v2z',
        maximize:    'M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z',
        close:       'M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z',
        play:        'M8 5v14l11-7z',
        pause:       'M6 19h4V5H6v14zm8-14v14h4V5h-4z',
        skipBack:    'M6 6h2v12H6zm3.5 6l8.5 6V6z',
        skipFwd:     'M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z',

        repeat:      'M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z',
        repeatOne:   'M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2V9h-1l-2 1v1h1.5v4H13z',

        ytMusic:     'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z',

    // ── Home Screen ─────────────────────────────────────────────

    function HomeScreen(props) {
        var onLoad = props.onLoad;

        return html`
            <div class="flex-1 relative flex flex-col items-center justify-center text-center px-6 animate-fade-in select-none"
                 style=${{ background: 'radial-gradient(ellipse at 50% 40%, rgba(168,85,247,0.06) 0%, transparent 70%)' }}>

                <!-- Animated Spice Logo -->
                <div class="mb-2" style=${{ animation: 'float 4s ease-in-out infinite' }}>
                    <div class="text-purple-500 mb-4">${icon(IC.ytMusic, 56)}</div>
                </div>

                <h1 class="text-5xl font-extralight tracking-[0.2em] mb-2"
                    style=${{ background: 'linear-gradient(135deg, #c084fc 0%, #a855f7 50%, #7c3aed 100%)',
                              WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>
                    SPICE
                </h1>
                <p class="text-gray-600 text-xs tracking-[0.3em] uppercase mb-5 font-medium">
                    Your music · Elevated
                </p>

                <p class="text-gray-500 text-sm mb-14">
                    Ready to <span class="text-purple-400 font-semibold"
                        style=${{ textShadow: '0 0 16px rgba(168,85,247,0.85)' }}>Spice</span> things up?
                </p>

                <!-- Service Cards -->
                <div class="flex gap-6 flex-wrap justify-center">
                    <!-- YouTube Music -->
                    <button class="group glass rounded-2xl w-[240px] h-[200px] flex flex-col items-center justify-center
                                   cursor-pointer transition-all duration-300 hover:-translate-y-1.5
                                   hover:border-purple-500/30 hover:shadow-[0_8px_40px_rgba(168,85,247,0.15)]
                                   active:scale-95"
                            onClick=${function() { onLoad('yt'); }}>
                        <div class="text-purple-500 mb-5 transition-transform duration-300 group-hover:scale-110">
                            ${icon(IC.play, 44)}
                        </div>
                        <h2 class="text-base font-semibold tracking-wide">YouTube Music</h2>
                        <span class="text-[11px] text-gray-600 mt-1">Ad-free streaming</span>
                    </button>

                    <!-- Spice Music -->
                    <button class="group glass rounded-2xl w-[240px] h-[200px] flex flex-col items-center justify-center
                                   cursor-pointer transition-all duration-300 hover:-translate-y-1.5
                                   hover:border-purple-500/30 hover:shadow-[0_8px_40px_rgba(168,85,247,0.15)]
                                   active:scale-95"
                            onClick=${function() { onLoad('spice_crazy'); }}>
                        <div class="text-purple-500 mb-5 transition-transform duration-300 group-hover:scale-110">
                            ${icon(IC.ytMusic, 44)}
                        </div>
                        <div class="flex items-center gap-2">
                            <h2 class="text-base font-semibold tracking-wide">Spice Music</h2>
                            <span class="text-[9px] uppercase tracking-[0.18em] text-purple-300 bg-purple-500/15 border border-purple-500/25 rounded-full px-2 py-0.5">Preview</span>
                        </div>
                        <span class="text-[11px] text-gray-600 mt-1">Wrapped web player</span>
                    </button>
                </div>

                <!-- Deprecated Services -->
                <div class="absolute right-4 bottom-4 text-left no-drag opacity-35 hover:opacity-100 transition-opacity duration-300">
                    <label class="block text-[9px] uppercase tracking-[0.24em] text-gray-800 mb-1.5">
                        Deprecated folder
                    </label>
                    <select class="bg-black/40 text-gray-600 border border-white/[0.04] rounded-full
                                   px-2.5 py-1.5 text-[11px] outline-none cursor-pointer hover:text-gray-300
                                   hover:border-purple-500/20 focus:border-purple-500/30 transition-all"
                            onChange=${function(e) {
                                if (e.target.value) {
                                    onLoad(e.target.value);
                                    e.target.value = '';

                        <option value="">Legacy services</option>
                        <option value="sc">SoundCloud</option>

    }

    // ── URL Modal ────────────────────────────────────────────────

    function URLModal(props) {
        var onClose = props.onClose;
        var inputRef = useRef(null);
        var errorRef = useRef(null);

        useEffect(function() {
            if (inputRef.current) inputRef.current.focus();
        }, []);

        function handleGo() {
            var url = (inputRef.current.value || '').trim();
            if (!url) return;
            try {
                var parsed = new URL(url);
                var h = parsed.hostname.toLowerCase();
                var valid = h.includes('music.youtube.com') ||
                            h.includes('soundcloud.com') ||
                            h === 'music.spice-app.xyz';
                if (!valid) {
                    if (errorRef.current) errorRef.current.textContent = 'Only supported service URLs are allowed.';
                    return;
                }
                callApi('loadUrl', url);
                onClose();
            } catch (e) {
                if (errorRef.current) errorRef.current.textContent = 'Invalid URL format.';
            }
        }

        return html`
            <div class="modal-backdrop animate-fade-in" onClick=${onClose}>
                <div class="glass-strong rounded-2xl p-6 w-[420px] max-w-[90vw] animate-slide-up"
                     onClick=${function(e) { e.stopPropagation(); }}>
                    <h3 class="text-lg font-semibold mb-4">Open URL</h3>
                    <input ref=${inputRef} type="text"
                           placeholder="https://music.spice-app.xyz/?song=..."
                           class="w-full bg-black/40 border border-white/10 rounded-lg px-4 py-2.5 text-sm text-white
                                  placeholder-gray-600 focus:border-purple-500/50 focus:ring-2 focus:ring-purple-500/20
                                  outline-none transition-all"
                           onKeyDown=${function(e) { if (e.key === 'Enter') handleGo(); }} />
                    <p ref=${errorRef} class="text-red-400 text-xs mt-2 min-h-[16px]"></p>
                    <div class="flex justify-end gap-3 mt-4">
                        <button class="px-4 py-2 rounded-lg text-sm text-gray-400 hover:text-white hover:bg-white/5 transition-all"
                                onClick=${onClose}>Cancel</button>
                        <button class="px-5 py-2 rounded-lg text-sm font-medium bg-purple-500 text-white
                                       hover:bg-purple-400 transition-all active:scale-95"
                                onClick=${handleGo}>Go</button>
                    </div>
                </div>
            </div>
        `;
    }

    // ── Player Bar (VK Player Island) ────────────────────────────

    function PlayerBar(props) {
        var track = props.track;
        var isDragging = props.isDragging;
        var dragTime = props.dragTime;
        var onDragStart = props.onDragStart;

        var displayTime = isDragging ? dragTime : (track.currentTime || 0);
        var pct = track.duration > 0 ? Math.min(100, (displayTime / track.duration) * 100) : 0;

        return html`
            <div class="h-[50px] flex items-center px-4 gap-2 no-drag relative z-[1999] border-b border-white/[0.04]"
                 id="vk-player-bar"
                 style=${{ background: 'linear-gradient(180deg, rgba(10,10,12,0.98) 0%, rgba(0,0,0,0.95) 100%)' }}>

                <!-- Album Art -->
                ${track.albumArt
                    ? html`<img src=${track.albumArt}
                                class="w-[38px] h-[38px] rounded-lg object-cover flex-shrink-0"
                                style=${{ boxShadow: '0 2px 12px rgba(0,0,0,0.5)' }}
                                alt="" />`
                    : html`<div class="w-[38px] h-[38px] rounded-lg bg-white/[0.04] flex-shrink-0 flex items-center justify-center text-gray-700">
                                ${icon(IC.ytMusic, 20)}
                           </div>`
                }

                <!-- Track Info -->
                <div class="flex flex-col min-w-0 max-w-[200px] ml-1.5">
                    <span class="text-[13px] font-medium text-white truncate leading-tight">
                        ${track.title || 'No track playing'}
                    </span>
                    <span class="text-[11px] text-gray-500 truncate leading-tight mt-0.5">
                        ${track.artist || 'Select a song to start'}
                    </span>
                </div>

                <!-- Playback Controls -->
                <div class="flex items-center gap-0.5 ml-3">
                    <button class="ctrl-btn" onClick=${function() { callApi('vkCommand', 'prev'); }}
                            title="Previous">${icon(IC.skipBack)}</button>
                    <button class="play-btn" onClick=${function() { callApi('vkCommand', 'playpause'); }}
                            title=${track.paused ? 'Play' : 'Pause'}>
                        ${track.paused ? icon(IC.play, 18) : icon(IC.pause, 18)}
                    </button>
                    <button class="ctrl-btn" onClick=${function() { callApi('vkCommand', 'next'); }}
                            title="Next">${icon(IC.skipFwd)}</button>
                </div>

                <!-- Like -->
                <button class=${'ctrl-btn ' + (track.likeStatus ? 'text-purple-500' : '')}
                        onClick=${function() { callApi('vkCommand', 'like'); }}
                        title="Like">
                    ${icon(IC.heart)}
                </button>

                <!-- Progress Bar -->
                <div class="flex items-center gap-2 flex-1 mx-3 min-w-0">
                    <span class="text-[10px] text-gray-600 min-w-[32px] tabular-nums font-medium">
                        ${fmtTime(displayTime)}
                    </span>
                    <div class="flex-1 h-[5px] bg-white/[0.06] rounded-full relative cursor-pointer group"
                         onMouseDown=${onDragStart}>
                        <div class="h-full rounded-full relative transition-[width] duration-75"
                             style=${{ width: pct + '%',
                                       background: 'linear-gradient(90deg, #7c3aed, #a855f7)' }}>
                            <div class="absolute right-0 top-1/2 -translate-y-1/2 w-[13px] h-[13px] rounded-full bg-white
                                        opacity-0 group-hover:opacity-100 transition-opacity duration-150"
                                 style=${{ boxShadow: '0 0 8px rgba(168,85,247,0.6), 0 1px 3px rgba(0,0,0,0.4)' }}></div>
                        </div>
                    </div>
                    <span class="text-[10px] text-gray-600 min-w-[32px] text-right tabular-nums font-medium">
                        ${fmtTime(track.duration)}
                    </span>
                </div>

                <!-- Shuffle / Repeat -->
                <button class=${'ctrl-btn ' + (track.shuffle ? 'text-purple-500' : '')}
                        onClick=${function() { callApi('vkCommand', 'shuffle'); }}
                        title="Shuffle">${icon(IC.shuffle)}</button>
                <button class=${'ctrl-btn ' + (track.repeat && track.repeat !== 'off' ? 'text-purple-500' : '')}
                        onClick=${function() { callApi('vkCommand', 'repeat'); }}
                        title="Repeat">
                    ${track.repeat === 'one' ? icon(IC.repeatOne) : icon(IC.repeat)}
                </button>

                <!-- Add to Playlist -->
                <button class="ctrl-btn text-gray-700" title="Add to Playlist"
                        onClick=${function() { callApi('vkCommand', 'playlist'); }}>
                    ${icon(IC.addList)}
                </button>
            </div>
        `;
    }

    // ── Title Bar ────────────────────────────────────────────────

    function TitleBar(props) {
        var volume = props.volume;
        var setVolume = props.setVolume;
        var boostEnabled = props.boostEnabled;
        var setBoostEnabled = props.setBoostEnabled;
        var showVolumePopup = props.showVolumePopup;
        var setShowVolumePopup = props.setShowVolumePopup;
        var topSearchVisible = props.topSearchVisible;
        var toolbarButtons = props.toolbarButtons || {};
        var activeService = props.activeService;
        var onOpenUrlModal = props.onOpenUrlModal;
        var showServiceTools = activeService === 'yt';
        var showYoutubeTools = showServiceTools;
        function toolbarVisible(key) {
            return toolbarButtons[key] !== false;
        }

        var volumeRef = useRef(null);

        // Close volume popup on outside click
        useEffect(function() {
            if (!showVolumePopup) return;
            function handler(e) {
                if (volumeRef.current && !volumeRef.current.contains(e.target)) {
                    setShowVolumePopup(false);
                }
            }
            document.addEventListener('mousedown', handler);
            return function() { document.removeEventListener('mousedown', handler); };
        }, [showVolumePopup]);

        var _boostWarn = useState(false);
        var showBoostWarning = _boostWarn[0];
        var setShowBoostWarning = _boostWarn[1];

        function disableBoost() {
            if (volume > 200) {
                setVolume(200);
                callApi('setVolume', 2.0);
            }
            setBoostEnabled(false);
        }

        function requestBoost() {
            setShowBoostWarning(true);
        }

        function acceptBoostWarning() {
            setShowBoostWarning(false);
            setBoostEnabled(true);
        }

        function handleBoostClick(e) {
            e.stopPropagation();
            if (boostEnabled) {
                disableBoost();
                return;
            }
            requestBoost();
        }

        return html`
            <div class="h-[40px] flex items-center justify-between drag relative z-[2000] border-b border-white/[0.04]"
                 style=${{ background: 'rgba(0,0,0,0.92)' }}>

                <!-- LEFT: Nav Controls -->
                <div class="flex items-center h-full pl-2 no-drag gap-0.5">
                    ${toolbarVisible('back') && html`<button class="nav-btn" onClick=${function() { callApi('navigate', 'back'); }}
                            title="Back">${icon(IC.back)}</button>`}
                    ${toolbarVisible('reload') && html`<button class="nav-btn" onClick=${function() { callApi('navigate', 'reload'); }}
                            title="Reload">${icon(IC.refresh)}</button>`}
                    ${toolbarVisible('openUrl') && html`<button class="nav-btn" onClick=${function() { onOpenUrlModal(); }}
                            title="Open URL">${icon(IC.link)}</button>`}
                    ${toolbarVisible('home') && html`<button class="nav-btn" onClick=${function() { callApi('navigate', 'home'); }}
                            title="Home">${icon(IC.home)}</button>`}
                </div>

                <!-- CENTER: Search Bar -->
                ${topSearchVisible && showYoutubeTools && html`
                    <div class="absolute left-1/2 w-[320px] no-drag transition-transform duration-300"
                         style=${{ transform: showVolumePopup ? 'translateX(calc(-50% - 150px))' : 'translateX(-50%)' }}>
                        <div class="relative">
                            <div class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-600 pointer-events-none">
                                ${icon(IC.search, 14)}
                            </div>
                            <input type="text" placeholder="Search"
                                   id="spice-search-bar"
                                   class="w-full bg-white/[0.04] text-white border border-white/[0.06] rounded-full
                                          pl-9 pr-4 py-1.5 text-[13px] placeholder-gray-600
                                          focus:border-purple-500/40 focus:bg-white/[0.06]
                                          outline-none transition-all"
                                   onKeyDown=${function(e) {
                                       if (e.key === 'Enter' && e.target.value.trim()) {
                                           callApi('executeSearch', e.target.value.trim());
                                           e.target.blur();
                                       }
                                   }} />
                        </div>
                    </div>
                `}

                <!-- RIGHT: Feature + Window Buttons -->
                <div class="flex items-center h-full ml-auto no-drag">
                    <!-- Volume -->
                    <div ref=${volumeRef} class=${(showServiceTools && toolbarVisible('volume') ? 'flex' : 'hidden') + ' items-center h-full'}>
                        <button class="nav-btn"
                                onClick=${function(e) { e.stopPropagation(); setShowVolumePopup(!showVolumePopup); }}
                                title="Volume">
                            ${volume === 0 ? icon(IC.volX) : icon(IC.vol2)}
                        </button>
                        ${showVolumePopup && html`
                            <div class="flex items-center bg-white/[0.04] rounded-full px-3 h-[28px]
                                        border border-white/[0.06] mr-1 animate-fade-in gap-2">
                                <input type="range" min="0" max=${boostEnabled ? 1000 : 200} step="5"
                                       value=${volume} class="w-[110px]"
                                       onInput=${function(e) {
                                           var v = parseInt(e.target.value);
                                           setVolume(v);
                                           callApi('setVolume', v / 100);
                                       }}
                                       onDblClick=${function() {
                                           var max = boostEnabled ? 1000 : 200;
                                           var input = prompt('Enter volume (0-' + max + '):', volume);
                                           if (input !== null) {
                                               var val = parseInt(input);
                                               if (!isNaN(val)) {
                                                   val = Math.max(0, Math.min(max, val));
                                                   setVolume(val);
                                                   callApi('setVolume', val / 100);
                                               }
                                           }
                                       }}
                                       onWheel=${function(e) {
                                           e.preventDefault();
                                           var max = boostEnabled ? 1000 : 200;
                                           var delta = e.deltaY < 0 ? 10 : -10;
                                           var next = Math.max(0, Math.min(max, volume + delta));
                                           setVolume(next);
                                           callApi('setVolume', next / 100);
                                       }} />
                                <span class="text-[10px] text-gray-500 min-w-[32px] text-right font-bold tabular-nums">
                                    ${volume}%
                                </span>
                                <button class=${'text-[10px] px-2 py-0.5 rounded-full border transition-all '
                                    + (boostEnabled
                                        ? 'border-purple-500/50 text-purple-400 bg-purple-500/10'
                                        : 'border-white/10 text-gray-600 hover:text-gray-400 hover:bg-white/5')}
                                    onClick=${handleBoostClick}>Boost</button>
                            </div>
                        `}
                    </div>

                    <!-- Feature Buttons -->
                    ${showServiceTools && toolbarVisible('lyrics') && html`<button class="nav-btn" onClick=${function() { callApi('openLyrics'); }}
                            title="Lyrics">${icon(IC.mic)}</button>`}
                    ${showServiceTools && toolbarVisible('miniPlayer') && html`<button class="nav-btn" onClick=${function() { callApi('openMiniPlayer'); }}
                            title="Mini Player">${icon(IC.pip)}</button>`}
                    ${showServiceTools && toolbarVisible('queue') && html`<button class="nav-btn" onClick=${function() { callApi('openQueue'); }}
                            title="Queue">${icon(IC.queue)}</button>`}
                    <button class="nav-btn" onClick=${function() { callApi('openSettings'); }}
                            title="Settings">${icon(IC.settings)}</button>

                    <!-- Separator -->
                    <div class="w-px h-4 bg-white/[0.06] mx-1"></div>

                    <!-- Window Controls -->
                    <button class="win-btn" onClick=${function() { callApi('windowControls', 'minimize'); }}
                            title="Minimize">${icon(IC.minimize, 10)}</button>
                    <button class="win-btn" onClick=${function() { callApi('windowControls', 'maximize'); }}
                            title="Maximize">${icon(IC.maximize, 10)}</button>
                    <button class="win-btn win-close" onClick=${function() { callApi('windowControls', 'close'); }}
                            title="Close">${icon(IC.close, 10)}</button>
                </div>

                ${showBoostWarning && html`
                    <div class="fixed inset-0 z-[5000] flex items-center justify-center bg-black/70 no-drag"
                         onMouseDown=${function(e) { e.stopPropagation(); }}
                         onClick=${function(e) { e.stopPropagation(); }}>
                        <div class="w-[360px] rounded-2xl border border-purple-500/30 bg-[#0d0d12] p-5 shadow-2xl shadow-purple-950/30"
                             role="dialog"
                             aria-modal="true"
                             aria-labelledby="boost-warning-title">
                            <div class="mb-3 text-sm font-semibold text-purple-300" id="boost-warning-title">
                                Volume Boost Warning
                            </div>
                            <p class="mb-4 text-[13px] leading-5 text-gray-300">
                                Boost can push audio above normal safe levels. High volume may cause permanent hearing damage,
                                especially with headphones, and can also distort or damage speakers.
                            </p>
                            <p class="mb-5 text-[12px] leading-5 text-gray-500">
                                Start low, raise volume slowly, and stop immediately if audio feels painful or distorted.
                            </p>
                            <div class="flex justify-end gap-2">
                                <button class="rounded-full border border-white/10 px-4 py-1.5 text-[12px] text-gray-300 hover:bg-white/5"
                                        onClick=${function(e) {
                                            e.stopPropagation();
                                            setShowBoostWarning(false);
                                        }}>
                                    Cancel
                                </button>
                                <button class="rounded-full border border-purple-400/50 bg-purple-500/20 px-4 py-1.5 text-[12px] font-semibold text-purple-100 hover:bg-purple-500/30"
                                        onClick=${function(e) {
                                            e.stopPropagation();
                                            acceptBoostWarning();
                                        }}>
                                    I understand, enable Boost
                                </button>
                            </div>
                        </div>
                    </div>
                `}
            </div>
        `;
    }

    // ── App (Root Component) ────────────────────────────────────

    function App() {
        // --- State ---
        var trackInit = {
            title: '', artist: '', albumArt: '',
            duration: 0, currentTime: 0, paused: true,
            shuffle: false, repeat: 'off', likeStatus: false,
        };
        var _track = useState(trackInit);       var track = _track[0];       var setTrack = _track[1];
        var _sa    = useState(false);            var serviceActive = _sa[0];  var setServiceActive = _sa[1];
        var _as    = useState(null);             var activeService = _as[0];   var setActiveService = _as[1];
        var _pv    = useState(false);            var playerVisible = _pv[0];  var setPlayerVisible = _pv[1];
        var _vol   = useState(100);              var volume = _vol[0];        var setVolume = _vol[1];
        var _boost = useState(false);            var boostEnabled = _boost[0]; var setBoostEnabled = _boost[1];
        var _vp    = useState(false);            var showVolumePopup = _vp[0]; var setShowVolumePopup = _vp[1];
        var _url   = useState(false);            var showUrlModal = _url[0];  var setShowUrlModal = _url[1];
        var _ts    = useState(false);            var topSearchVisible = _ts[0]; var setTopSearchVisible = _ts[1];
        var _tb    = useState({});               var toolbarButtons = _tb[0]; var setToolbarButtons = _tb[1];
        var _drag  = useState(false);            var isDragging = _drag[0];   var setIsDragging = _drag[1];
        var _dragT = useState(0);                var dragTime = _dragT[0];    var setDragTime = _dragT[1];

        // --- Refs ---
        var isDraggingRef = useRef(false);
        var serviceActiveRef = useRef(false);
        var durationRef = useRef(0);
        var progressBarRef = useRef(null);

        // Keep refs in sync
        useEffect(function() { isDraggingRef.current = isDragging; }, [isDragging]);
        useEffect(function() { serviceActiveRef.current = serviceActive; }, [serviceActive]);
        useEffect(function() { durationRef.current = track.duration; }, [track.duration]);

        // --- IPC Event Subscriptions (Electron mode) ---
        useEffect(function() {
            if (!window.api) return;

            // Track updates from main process
            window.api.onVkTrackUpdate(function(info) {
                setTrack(function(prev) {
                    return {
                        title:       info.title       || prev.title,
                        artist:      info.artist      || prev.artist,
                        albumArt:    info.albumArt    || prev.albumArt,
                        paused:      info.paused      !== undefined ? info.paused : prev.paused,
                        duration:    info.duration    || prev.duration,
                        currentTime: isDraggingRef.current ? prev.currentTime : (info.currentTime || prev.currentTime),
                        shuffle:     info.shuffle     !== undefined ? info.shuffle : prev.shuffle,
                        repeat:      info.repeat      || prev.repeat,
                        likeStatus:  info.likeStatus  !== undefined ? info.likeStatus : prev.likeStatus,
                    };
                });
            });

            // Service activation
            window.api.onServiceActive(function(active) {
                setServiceActive(active);
                if (!active) {
                    setActiveService(null);
                    setPlayerVisible(false);
                }
            });

            if (window.api.onActiveServiceChanged) {
                window.api.onActiveServiceChanged(function(service) {
                    setActiveService(service || null);
                });
            }

            // VK Player visibility
            if (window.api.onVkPlayerVisibility) {
                window.api.onVkPlayerVisibility(function(visible) {
                    setPlayerVisible(visible);
                });
            }

            // Volume sync
            if (window.api.onVolumeChanged) {
                window.api.onVolumeChanged(function(gain) {
                    setVolume(Math.round(gain * 100));
                });
            }

            // Search bar visibility
            if (window.api.onTopBarSearchVisibility) {
                window.api.onTopBarSearchVisibility(function(vis) {
                    setTopSearchVisible(vis);
                });
            }

            if (window.api.onToolbarButtonsChanged) {
                window.api.onToolbarButtonsChanged(function(buttons) {
                    setToolbarButtons(buttons || {});
                });
            }

            // Update status notifications
            if (window.api.onUpdateStatus) {
                window.api.onUpdateStatus(function(status) {
                    console.log('[Spice] Update status:', status);
                });
            }
        }, []);

        // --- Initial Settings Load ---
        useEffect(function() {
            (async function() {
                // Load initial volume
                var vol = await callApi('getVolume');
                if (vol !== null && vol !== undefined) {
                    setVolume(Math.round((typeof vol === 'number' ? vol : 1) * 100));
                }

                // Check search bar visibility
                var searchVis = await callApi('getTopBarSearch');
                if (searchVis === true) setTopSearchVisible(true);

                if (window.api && window.api.getSettings) {
                    var settings = await window.api.getSettings();
                    setToolbarButtons((settings && settings.toolbarButtons) || {});
                }
            })();
        }, []);

        // --- Browser Polling (non-Electron fallback) ---
        useEffect(function() {
            if (window.api) return;

            var id = setInterval(async function() {
                try {
                    var res = await fetch('/api/status');
                    var state = await res.json();
                    if (state && state.track) {
                        setTrack({
                            title:       state.track.title || '',
                            artist:      state.track.artist || '',
                            albumArt:    state.track.art || '',
                            paused:      !!state.paused,
                            currentTime: state.currentTime || 0,
                            duration:    state.track.duration || 0,
                            shuffle:     !!state.shuffle,
                            repeat:      state.repeat || 'off',
                            likeStatus:  !!state.likeStatus,
                        });
                        setServiceActive(true);
                        setActiveService('yt');
                        setPlayerVisible(true);
                    }
                } catch (e) { /* polling failed, ignore */ }
            }, 1000);

            return function() { clearInterval(id); };
        }, []);

        // --- Progress Bar Drag Logic ---
        useEffect(function() {
            function onMouseMove(e) {
                if (!isDraggingRef.current) return;
                var bars = document.querySelectorAll('#vk-player-bar .group');
                var bar = bars[0];
                if (!bar) return;
                var rect = bar.getBoundingClientRect();
                var pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                setDragTime(pct * durationRef.current);
            }

            function onMouseUp(e) {
                if (!isDraggingRef.current) return;
                isDraggingRef.current = false;
                setIsDragging(false);
                var bars = document.querySelectorAll('#vk-player-bar .group');
                var bar = bars[0];
                if (bar && durationRef.current > 0) {
                    var rect = bar.getBoundingClientRect();
                    var pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                    var seekTime = pct * durationRef.current;
                    callApi('vkCommand', { action: 'seek', time: seekTime });
                }
            }

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
            return function() {
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            };
        }, []);

        var handleDragStart = useCallback(function(e) {
            if (!track.duration || track.duration <= 0) return;
            isDraggingRef.current = true;
            setIsDragging(true);
            // Calculate initial drag position
            var bar = e.currentTarget;
            var rect = bar.getBoundingClientRect();
            var pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            setDragTime(pct * track.duration);
        }, [track.duration]);

        // --- URL Modal Handlers ---
        function openUrlModal() {
            callApi('hideView');
            setShowUrlModal(true);
        }
        function closeUrlModal() {
            setShowUrlModal(false);
            callApi('showView');
        }

        // --- Service Load Handler ---
        var handleLoadService = useCallback(function(service) {
            callApi('loadService', service);
            if (!window.api) {
                setServiceActive(true);
                setActiveService(service);
                setPlayerVisible(true);
            }
        }, []);

        // --- Render ---
        return html`
            <div class="flex flex-col h-screen bg-[#0a0a0c] text-white font-sans overflow-hidden">

                <${TitleBar}
                    volume=${volume}
                    setVolume=${setVolume}
                    boostEnabled=${boostEnabled}
                    setBoostEnabled=${setBoostEnabled}
                    showVolumePopup=${showVolumePopup}
                    setShowVolumePopup=${setShowVolumePopup}
                    topSearchVisible=${topSearchVisible}
                    toolbarButtons=${toolbarButtons}
                    activeService=${activeService}
                    onOpenUrlModal=${openUrlModal}
                />

                ${playerVisible && html`
                    <${PlayerBar}
                        track=${track}
                        isDragging=${isDragging}
                        dragTime=${dragTime}
                        onDragStart=${handleDragStart}
                    />
                `}

                ${!serviceActive && html`
                    <${HomeScreen} onLoad=${handleLoadService} />
                `}

                ${showUrlModal && html`
                    <${URLModal} onClose=${closeUrlModal} />
                `}
            </div>
        `;
    }

    // ── Mount ────────────────────────────────────────────────────
    var root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(html`<${App} />`);

    </script>
</body>
</html>
