    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

    <script>
    // ================================================================
    //  Spice 3 — Obsidian Purple
    //  A React-based remote control for the Spice music engine.
    //  Communicates with the Electron main process via window.api (IPC)
    //  with a fetch-based browser fallback for remote/web access.
    // ================================================================

    // ── Library Guard ────────────────────────────────────────────
    if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
        document.getElementById('root').innerHTML =
            '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#666;font-family:Inter,sans-serif">' +
            '<p>Loading Spice UI… Please check your internet connection.</p></div>';
        throw new Error('React not loaded');
    }

    const html = (typeof htm !== 'undefined' ? htm : window.htm).bind(React.createElement);
    const { useState, useEffect, useRef, useCallback } = React;

    // ── Helpers ──────────────────────────────────────────────────

    function fmtTime(s) {
        if (!s || isNaN(s) || s < 0) return '0:00';
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    function normalizeShellTheme(value) {
        var accents = ['pink', 'blue', 'orange', 'green', 'gold', 'crimson', 'deeppurple'];
        var surfaces = ['midnight', 'glass', 'solid', 'aurora'];
        value = value && typeof value === 'object' ? value : {};
        return {
            accent: accents.includes(value.accent) ? value.accent : 'deeppurple',
            surface: surfaces.includes(value.surface) ? value.surface : 'midnight',
        };
    }

    function applyShellTheme(value) {
        var theme = normalizeShellTheme(value);
        document.documentElement.dataset.spiceAccent = theme.accent;
        document.documentElement.dataset.spiceSurface = theme.surface;
        return theme;
    }

    function isSupportedServiceUrl(value) {
        try {
            var parsed = new URL(value);
            if (parsed.username || parsed.password) return false;
            var host = parsed.hostname.toLowerCase();
            var local = parsed.protocol === 'http:' &&
                (host === '127.0.0.1' || host === 'localhost') && parsed.port === '3939';
            var remote = parsed.protocol === 'https:' && [
                'music.youtube.com', 'www.music.youtube.com',
                'soundcloud.com', 'www.soundcloud.com', 'm.soundcloud.com',
                'music.spice-app.xyz', 'install.spice-app.xyz'
            ].includes(host);
            return local || remote;
        } catch (_) {
            return false;
        }
    }

    async function callApi(action) {
        var args = Array.prototype.slice.call(arguments, 1);

        // 1. Electron IPC (primary)
        if (window.api) {
            switch (action) {
                case 'loadService':    return window.api.loadService(args[0]);
                case 'navigate':       return window.api.navigate(args[0]);
                case 'openSettings':   return window.api.openSettings();
                case 'setVolume':      return window.api.setVolume(args[0]);
                case 'getVolume':      return window.api.getVolume();
                case 'loadUrl':        return window.api.loadUrl(args[0]);
                case 'hideView':       return window.api.hideView();
                case 'showView':       return window.api.showView();
                case 'toggleVolume':   return window.api.toggleVolume();
                case 'setBoostEnabled': return window.api.setBoostEnabled(args[0]);
                case 'openLyrics':     return window.api.openLyrics();
                case 'openMiniPlayer': return window.api.openMiniPlayer();
                case 'openQueue':      return window.api.openQueue();
                case 'openDevTools':   return window.api.openDevTools();
                case 'getNowPlaying':  return window.api.getNowPlaying();
                case 'executeSearch':  return window.api.executeSearch(args[0]);
                case 'getTopBarSearch': return window.api.getTopBarSearch();
                case 'vkCommand':      return window.api.vkCommand(args[0]);
                case 'checkForUpdates': return window.api.checkForUpdates();
                case 'installUpdate':  return window.api.installUpdate();
                case 'spiceRuntimeStatus': return window.api.spiceRuntime && window.api.spiceRuntime.getStatus();
                case 'spiceRuntimeInstall': return window.api.spiceRuntime && window.api.spiceRuntime.install();
                case 'spiceRuntimeStart': return window.api.spiceRuntime && window.api.spiceRuntime.start();
                case 'spiceRuntimeStop': return window.api.spiceRuntime && window.api.spiceRuntime.stop();
                case 'nativeAppStatus': return window.api.native && window.api.native.getStatus();
                case 'nativePrepareRuntime': return window.api.native && window.api.native.prepareRuntime();
                case 'nativeAuth': return window.api.native && window.api.native.auth(args[0]);
                case 'nativeContinueOffline': return window.api.native && window.api.native.continueOffline();
                case 'nativeSetAutoOpen': return window.api.native && window.api.native.setAutoOpen(args[0]);
                case 'nativeSignOut': return window.api.native && window.api.native.signOut();
                case 'windowControls':
                    if (args[0] === 'minimize') return window.api.windowControls.minimize();
                    if (args[0] === 'maximize') return window.api.windowControls.maximize();
                    if (args[0] === 'close')    return window.api.windowControls.close();
                    break;
            }
        }

        // 2. Browser/Remote fallback (fetch-based)
        var serverAction = action;
        var body = {};

        if (action === 'vkCommand') {
            var cmd = args[0];
            if (typeof cmd === 'string') { serverAction = cmd; }
            else if (typeof cmd === 'object') { serverAction = cmd.action; body = cmd; }
        } else if (action === 'setVolume') {
            serverAction = 'volume';
            body = { value: args[0] };
        } else if (action === 'loadService') {
            serverAction = 'loadService';
            body = { service: args[0] };
        }

        try {
            var response = await fetch('/api/control', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: serverAction, ...body }),
            });
            return await response.json();
        } catch (err) {
            console.error('Remote API Error:', err);
            return null;
        }
    }

    // ── SVG Icon Helper ─────────────────────────────────────────

    function icon(d, s) {
        s = s || 16;
        var paths = Array.isArray(d) ? d : [d];
        return html`<svg width=${s} height=${s} viewBox="0 0 24 24" fill="currentColor">
            ${paths.map(function(p, i) { return html`<path key=${i} d=${p} />`; })}
        </svg>`;
    }

        minimize:    'M19 13H5v-2h14v2z',
        maximize:    'M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z',
        close:       'M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z',
        play:        'M8 5v14l11-7z',
        pause:       'M6 19h4V5H6v14zm8-14v14h4V5h-4z',
        skipBack:    'M6 6h2v12H6zm3.5 6l8.5 6V6z',
        skipFwd:     'M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z',

        repeatOne:   'M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2V9h-1l-2 1v1h1.5v4H13z',

        addList:     'M14 10H2v2h12v-2zm0-4H2v2h12V6zm4 8v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zM2 16h8v-2H2v2z',
        ytMusic:     'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z',

    // ── Home Screen ─────────────────────────────────────────────

    function HomeScreen(props) {
        var onLoad = props.onLoad;
        var nativeMode = !!props.nativeMode;
        var runtimeManagerAvailable = !!(window.api && window.api.spiceRuntime);
        var _runtimeStatus = useState(null);
        var runtimeStatus = _runtimeStatus[0];
        var setRuntimeStatus = _runtimeStatus[1];
        var _runtimeBusy = useState(false);
        var runtimeBusy = _runtimeBusy[0];
        var setRuntimeBusy = _runtimeBusy[1];
        var _runtimeMessage = useState('');
        var runtimeMessage = _runtimeMessage[0];
        var setRuntimeMessage = _runtimeMessage[1];
        var _nativeStatus = useState(null);
        var nativeStatus = _nativeStatus[0];
        var setNativeStatus = _nativeStatus[1];
        var _nativeBusy = useState(false);
        var nativeBusy = _nativeBusy[0];
        var setNativeBusy = _nativeBusy[1];
        var _nativeMessage = useState('');
        var nativeMessage = _nativeMessage[0];
        var setNativeMessage = _nativeMessage[1];
        var _authMode = useState('signin');
        var authMode = _authMode[0];
        var setAuthMode = _authMode[1];
        var _authEmail = useState('');
        var authEmail = _authEmail[0];
        var setAuthEmail = _authEmail[1];
        var _authPassword = useState('');
        var authPassword = _authPassword[0];
        var setAuthPassword = _authPassword[1];
        var _authUsername = useState('');
        var authUsername = _authUsername[0];
        var setAuthUsername = _authUsername[1];

        useEffect(function() {
            if (!runtimeManagerAvailable) return;
            refreshRuntimeStatus();
            if (window.api.spiceRuntime.onStatus) {
                return window.api.spiceRuntime.onStatus(function(status) {
                    if (status) {
                        setRuntimeStatus(status);
                        if (status.message) setRuntimeMessage(status.message);
                    }
                });
            }
        }, []);

        useEffect(function() {
            if (!nativeMode) return;
            refreshNativeStatus();
        }, [nativeMode]);

        async function refreshRuntimeStatus() {
            var status = await callApi('spiceRuntimeStatus');
            if (status) {
                setRuntimeStatus(status);
                if (status.message) setRuntimeMessage(status.message);
            }
        }

        async function runRuntimeAction(action) {
            setRuntimeBusy(true);
            setRuntimeMessage('Working...');
            try {
                var status = await callApi(action);
                if (status) {
                    setRuntimeStatus(status);
                    setRuntimeMessage(status.message || 'Done');
                }
            } catch (err) {
                setRuntimeMessage(err && err.message ? err.message : 'Runtime action failed.');
            } finally {
                setRuntimeBusy(false);
                refreshRuntimeStatus();
            }
        }

        function runtimeLabel() {
            if (!runtimeStatus) return 'Checking local runtime';
            if (!runtimeStatus.supported) return 'Managed install is unavailable on this platform';
            if (runtimeStatus.running) return 'Running on 127.0.0.1:3939';
            if (runtimeStatus.installed) return 'Installed ' + (runtimeStatus.installedVersion || '');
            return 'Not installed';
        }

        async function refreshNativeStatus() {
            try {
                var status = await callApi('nativeAppStatus');
                if (status) {
                    setNativeStatus(status);
                    if (status.runtime && status.runtime.message) setNativeMessage(status.runtime.message);
                }
            } catch (err) {
                setNativeMessage(err && err.message ? err.message : 'Native backend status is not ready yet.');
            }
        }

        async function prepareNativeRuntime() {
            setNativeBusy(true);
            setNativeMessage('Starting local runtime...');
            try {
                var status = await callApi('nativePrepareRuntime');
                if (status) {
                    setRuntimeStatus(status);
                    setNativeMessage(status.message || 'Local runtime is ready.');
                }
                await refreshNativeStatus();
                return true;
            } catch (err) {
                setNativeMessage(err && err.message ? err.message : 'Local runtime setup failed.');
                return false;
            } finally {
                setNativeBusy(false);
            }
        }

        async function handleNativeAuth(e) {
            e.preventDefault();
            setNativeBusy(true);
            setNativeMessage(authMode === 'register' ? 'Creating SPICE account...' : 'Signing in...');
            try {
                var runtimeReady = await prepareNativeRuntime();
                if (!runtimeReady) return;
                await callApi('nativeAuth', {
                    mode: authMode,
                    email: authEmail,
                    password: authPassword,
                    username: authUsername,
                });
                setNativeMessage('Account connected. Opening SPICE Music...');
                await refreshNativeStatus();
                onLoad('spice_crazy');
            } catch (err) {
                setNativeMessage(err && err.message ? err.message : 'SPICE account setup failed.');
            } finally {
                setNativeBusy(false);
            }
        }

        async function continueNativeOffline() {
            setNativeBusy(true);
            setNativeMessage('Preparing local-only SPICE...');
            try {
                await callApi('nativeContinueOffline');
                await refreshNativeStatus();
                onLoad('spice_crazy');
            } catch (err) {
                setNativeMessage(err && err.message ? err.message : 'Could not start local SPICE.');
            } finally {
                setNativeBusy(false);
            }
        }

        async function launchNativeSpice() {
            setNativeBusy(true);
            setNativeMessage('Opening SPICE Music...');
            try {
                var runtimeReady = await prepareNativeRuntime();
                if (!runtimeReady) return;
                onLoad('spice_crazy');
            } finally {
                setNativeBusy(false);
            }
        }

        async function setNativeAutoOpen(enabled) {
            setNativeBusy(true);
            setNativeMessage(enabled ? 'SPICE Music will open automatically on launch.' : 'Native launcher will stay on this screen.');
            try {
                await callApi('nativeSetAutoOpen', enabled);
                await refreshNativeStatus();
            } catch (err) {
                setNativeMessage(err && err.message ? err.message : 'Could not update native launch preference.');
            } finally {
                setNativeBusy(false);
            }
        }

        if (nativeMode) {
            var account = nativeStatus && nativeStatus.account;
            var runtime = nativeStatus && nativeStatus.runtime;
            var autoOpen = !nativeStatus || nativeStatus.autoOpen !== false;
            var runtimeText = runtime
                ? (runtime.running ? 'Runtime running on 127.0.0.1:3939' : runtime.installed ? 'Runtime installed' : runtime.bundled ? 'Bundled runtime ready' : 'Runtime not prepared')
                : 'Checking runtime';

            return html`
                <div class="theme-home-bg flex-1 relative grid grid-cols-1 lg:grid-cols-[minmax(0,0.92fr)_minmax(380px,520px)] gap-8 px-8 py-8 overflow-auto">
                    <section class="flex flex-col justify-center min-h-[520px]">
                        <div class="max-w-[680px]">
                            <div class="theme-badge inline-flex items-center gap-2 rounded-full border px-3 py-1 text-[11px] uppercase tracking-[0.22em] mb-5">
                                ${icon(IC.cloud, 15)} Native SPICE
                            </div>
                            <h1 class="text-5xl font-semibold tracking-normal leading-tight mb-4">
                                SPICE Music, local from the first launch.
                            </h1>
                            <p class="text-gray-400 text-base leading-7 max-w-[620px]">
                                The desktop app starts the bundled local runtime, keeps media extraction on this PC, and only uses the cloud account service for sign-in and sync.
                            </p>

                            <div class="grid sm:grid-cols-3 gap-3 mt-8">
                                <div class="rounded-xl border border-white/[0.07] bg-white/[0.035] p-4">
                                    <div class="text-[10px] uppercase tracking-[0.2em] text-gray-500 mb-2">Runtime</div>
                                    <div class="text-sm text-gray-100">${runtimeText}</div>
                                </div>
                                <div class="rounded-xl border border-white/[0.07] bg-white/[0.035] p-4">
                                    <div class="text-[10px] uppercase tracking-[0.2em] text-gray-500 mb-2">Account</div>
                                    <div class="text-sm text-gray-100">${account && account.user ? (account.user.email || 'Connected') : 'Optional'}</div>
                                </div>
                                <div class="rounded-xl border border-white/[0.07] bg-white/[0.035] p-4">
                                    <div class="text-[10px] uppercase tracking-[0.2em] text-gray-500 mb-2">Launch</div>
                                    <div class="text-sm text-gray-100">${autoOpen ? 'Auto-opens SPICE' : 'Launcher screen'}</div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section class="self-center rounded-2xl border border-white/[0.08] bg-black/35 p-5 shadow-[0_24px_80px_rgba(0,0,0,0.35)]">
                        ${account ? html`
                            <div>
                                <div class="theme-text-soft text-[11px] uppercase tracking-[0.22em] mb-2">Signed in</div>
                                <h2 class="text-2xl font-semibold mb-2">${account.user && account.user.email ? account.user.email : 'SPICE account connected'}</h2>
                                <p class="text-sm text-gray-400 mb-5">Your session will be injected into the local SPICE runtime when the player opens.</p>
                                <div class="flex flex-wrap gap-2">
                                    <button class="theme-primary-btn rounded-lg px-4 py-2 text-sm font-semibold text-white disabled:opacity-40"
                                            disabled=${nativeBusy}
                                            onClick=${launchNativeSpice}>
                                        Open SPICE Music
                                    </button>
                                    <button class="theme-outline-btn rounded-lg border px-4 py-2 text-sm font-semibold disabled:opacity-40"
                                            disabled=${nativeBusy}
                                            onClick=${function() { setNativeAutoOpen(!autoOpen); }}>
                                        ${autoOpen ? 'Auto-open enabled' : 'Auto-open on launch'}

    // ── URL Modal ────────────────────────────────────────────────

    function URLModal(props) {
        var onClose = props.onClose;
        var inputRef = useRef(null);
        var errorRef = useRef(null);
        var _busy = useState(false);
        var busy = _busy[0];
        var setBusy = _busy[1];

        useEffect(function() {
            if (inputRef.current) inputRef.current.focus();
            function onKeyDown(event) {
                if (event.key === 'Escape') onClose();
            }
            document.addEventListener('keydown', onKeyDown);
            return function() { document.removeEventListener('keydown', onKeyDown); };
        }, [onClose]);

        async function handleGo() {
            var url = (inputRef.current.value || '').trim();
            if (!url) return;
            if (!isSupportedServiceUrl(url)) {
                if (errorRef.current) errorRef.current.textContent = 'Enter an HTTPS URL for a supported service, or the local SPICE runtime URL.';
                return;
            }

            setBusy(true);
            if (errorRef.current) errorRef.current.textContent = '';
            try {
                var result = await callApi('loadUrl', url);
                if (result && result.success === false) {
                    throw new Error(result.error || 'The URL could not be opened.');
                }
                onClose();
            } catch (e) {
                if (errorRef.current) errorRef.current.textContent = e && e.message ? e.message : 'The URL could not be opened.';
            } finally {
                setBusy(false);
            }
        }

        return html`
            <div class="modal-backdrop animate-fade-in" onClick=${onClose}>
                <div class="glass-strong theme-dialog rounded-2xl p-6 w-[420px] max-w-[90vw] animate-slide-up"
                     role="dialog" aria-modal="true" aria-labelledby="open-url-title"
                     onClick=${function(e) { e.stopPropagation(); }}>
                    <h3 id="open-url-title" class="text-lg font-semibold mb-4">Open URL</h3>
                    <input ref=${inputRef} type="text"
                           placeholder="https://music.spice-app.xyz/?song=..."
                           disabled=${busy}
                           class="theme-input w-full bg-black/40 border border-white/10 rounded-lg px-4 py-2.5 text-sm text-white
                                  placeholder-gray-600 outline-none transition-all"
                           onKeyDown=${function(e) { if (e.key === 'Enter') handleGo(); }} />
                    <p ref=${errorRef} class="text-red-400 text-xs mt-2 min-h-[16px]"></p>
                    <div class="flex justify-end gap-3 mt-4">
                        <button class="px-4 py-2 rounded-lg text-sm text-gray-400 hover:text-white hover:bg-white/5 transition-all"
                                onClick=${onClose}>Cancel</button>
                        <button class="theme-primary-btn px-5 py-2 rounded-lg text-sm font-medium text-white
                                       transition-all active:scale-95 disabled:opacity-50"
                                disabled=${busy} onClick=${handleGo}>${busy ? 'Opening…' : 'Go'}</button>
                    </div>
                </div>
            </div>
        `;
    }

    // ── Title Bar ────────────────────────────────────────────────

    function TitleBar(props) {
        var volume = props.volume;
        var setVolume = props.setVolume;
        var boostEnabled = props.boostEnabled;
        var setBoostEnabled = props.setBoostEnabled;
        var showVolumePopup = props.showVolumePopup;
        var setShowVolumePopup = props.setShowVolumePopup;
        var topSearchVisible = props.topSearchVisible;
        var toolbarButtons = props.toolbarButtons || {};
        var nativeMode = !!props.nativeMode;
        var activeService = props.activeService;
        var onOpenUrlModal = props.onOpenUrlModal;
        var showServiceTools = activeService === 'yt' || activeService === 'spice_crazy';
        var showYoutubeTools = activeService === 'yt';
        function toolbarVisible(key) {
            if (nativeMode && key === 'openUrl') return false;
            return toolbarButtons[key] !== false;
        }

        var volumeRef = useRef(null);

        // Close volume popup on outside click
        useEffect(function() {
            if (!showVolumePopup) return;
            function handler(e) {
                if (volumeRef.current && !volumeRef.current.contains(e.target)) {
                    setShowVolumePopup(false);
                }
            }
            document.addEventListener('mousedown', handler);
            return function() { document.removeEventListener('mousedown', handler); };
        }, [showVolumePopup]);

        var _boostWarn = useState(false);
        var showBoostWarning = _boostWarn[0];
        var setShowBoostWarning = _boostWarn[1];

        function disableBoost() {
            if (volume > 200) {
                setVolume(200);
                callApi('setVolume', 2.0);
            }
            setBoostEnabled(false);
            callApi('setBoostEnabled', false);
        }

        function requestBoost() {
            setShowBoostWarning(true);
        }

        function acceptBoostWarning() {
            setShowBoostWarning(false);
            setBoostEnabled(true);
            callApi('setBoostEnabled', true);
        }

        function handleBoostClick(e) {
            e.stopPropagation();
            if (boostEnabled) {
                disableBoost();
                return;
            }
            requestBoost();
        }

        return html`
            <div class="spice-titlebar h-[40px] flex items-center justify-between drag relative z-[2000] border-b border-white/[0.04]">

                <!-- LEFT: Nav Controls -->
                <div class="flex items-center h-full pl-2 no-drag gap-0.5">
                    ${toolbarVisible('back') && html`<button class="nav-btn" onClick=${function() { callApi('navigate', 'back'); }}
                            title="Back">${icon(IC.back)}</button>`}
                    ${toolbarVisible('reload') && html`<button class="nav-btn" onClick=${function() { callApi('navigate', 'reload'); }}
                            title="Reload">${icon(IC.refresh)}</button>`}
                    ${toolbarVisible('openUrl') && html`<button class="nav-btn" onClick=${function() { onOpenUrlModal(); }}
                            title="Open URL">${icon(IC.link)}</button>`}
                    ${toolbarVisible('home') && html`<button class="nav-btn" onClick=${function() { callApi('navigate', 'home'); }}
                            title="Home">${icon(IC.home)}</button>`}
                </div>

                <!-- CENTER: Search Bar -->
                ${topSearchVisible && showYoutubeTools && html`
                    <div class="absolute left-1/2 w-[320px] no-drag transition-transform duration-300"
                         style=${{ transform: showVolumePopup ? 'translateX(calc(-50% - 150px))' : 'translateX(-50%)' }}>
                        <div class="relative">
                            <div class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-600 pointer-events-none">
                                ${icon(IC.search, 14)}
                            </div>
                            <input type="text" placeholder="Search"
                                   id="spice-search-bar"
                                   class="theme-input w-full bg-white/[0.04] text-white border border-white/[0.06] rounded-full
                                          pl-9 pr-4 py-1.5 text-[13px] placeholder-gray-600
                                          outline-none transition-all"
                                   onKeyDown=${function(e) {
                                       if (e.key === 'Enter' && e.target.value.trim()) {
                                           callApi('executeSearch', e.target.value.trim());
                                           e.target.blur();
                                       }
                                   }} />
                        </div>
                    </div>
                `}

                <!-- RIGHT: Feature + Window Buttons -->
                <div class="flex items-center h-full ml-auto no-drag">
                    <!-- Volume -->
                    <div ref=${volumeRef} class=${(showServiceTools && toolbarVisible('volume') ? 'flex' : 'hidden') + ' items-center h-full'}>
                        <button class="nav-btn"
                                onClick=${function(e) { e.stopPropagation(); setShowVolumePopup(!showVolumePopup); }}
                                title="Volume">
                            ${volume === 0 ? icon(IC.volX) : icon(IC.vol2)}
                        </button>
                        ${showVolumePopup && html`
                            <div class="flex items-center bg-white/[0.04] rounded-full px-3 h-[28px]
                                        border border-white/[0.06] mr-1 animate-fade-in gap-2">
                                <input type="range" min="0" max=${boostEnabled ? 1000 : 200} step="5"
                                       value=${volume} class="w-[110px]"
                                       onInput=${function(e) {
                                           var v = parseInt(e.target.value);
                                           setVolume(v);
                                           callApi('setVolume', v / 100);
                                       }}
                                       onDblClick=${function() {
                                           var max = boostEnabled ? 1000 : 200;
                                           var input = prompt('Enter volume (0-' + max + '):', volume);
                                           if (input !== null) {
                                               var val = parseInt(input);
                                               if (!isNaN(val)) {
                                                   val = Math.max(0, Math.min(max, val));
                                                   setVolume(val);
                                                   callApi('setVolume', val / 100);
                                               }
                                           }
                                       }}
                                       onWheel=${function(e) {
                                           e.preventDefault();
                                           var max = boostEnabled ? 1000 : 200;
                                           var delta = e.deltaY < 0 ? 10 : -10;
                                           var next = Math.max(0, Math.min(max, volume + delta));
                                           setVolume(next);
                                           callApi('setVolume', next / 100);
                                       }} />
                                <span class="text-[10px] text-gray-500 min-w-[32px] text-right font-bold tabular-nums">
                                    ${volume}%
                                </span>
                                <button class=${'text-[10px] px-2 py-0.5 rounded-full border transition-all '
                                    + (boostEnabled
                                        ? 'theme-badge'
                                        : 'border-white/10 text-gray-600 hover:text-gray-400 hover:bg-white/5')}
                                    onClick=${handleBoostClick}>Boost</button>
                            </div>
                        `}
                    </div>

                    <!-- Feature Buttons -->
                    ${showServiceTools && toolbarVisible('lyrics') && html`<button class="nav-btn" onClick=${function() { callApi('openLyrics'); }}
                            title="Lyrics">${icon(IC.mic)}</button>`}
                    ${showServiceTools && toolbarVisible('miniPlayer') && html`<button class="nav-btn" onClick=${function() { callApi('openMiniPlayer'); }}
                            title="Mini Player">${icon(IC.pip)}</button>`}
                    ${showServiceTools && toolbarVisible('queue') && html`<button class="nav-btn" onClick=${function() { callApi('openQueue'); }}
                            title="Queue">${icon(IC.queue)}</button>`}
                    <button class="nav-btn" onClick=${function() { callApi('openSettings'); }}
                            title="Settings">${icon(IC.settings)}</button>

                    <!-- Separator -->
                    <div class="w-px h-4 bg-white/[0.06] mx-1"></div>

                    <!-- Window Controls -->
                    <button class="win-btn" onClick=${function() { callApi('windowControls', 'minimize'); }}
                            title="Minimize">${icon(IC.minimize, 10)}</button>
                    <button class="win-btn" onClick=${function() { callApi('windowControls', 'maximize'); }}
                            title="Maximize">${icon(IC.maximize, 10)}</button>
                    <button class="win-btn win-close" onClick=${function() { callApi('windowControls', 'close'); }}
                            title="Close">${icon(IC.close, 10)}</button>
                </div>

                ${showBoostWarning && html`
                    <div class="fixed inset-0 z-[5000] flex items-center justify-center bg-black/70 no-drag"
                         onMouseDown=${function(e) { e.stopPropagation(); }}
                         onClick=${function(e) { e.stopPropagation(); }}>
                        <div class="theme-dialog w-[360px] rounded-2xl border p-5 shadow-2xl"
                             role="dialog"
                             aria-modal="true"
                             aria-labelledby="boost-warning-title">
                            <div class="theme-text-soft mb-3 text-sm font-semibold" id="boost-warning-title">
                                Volume Boost Warning
                            </div>
                            <p class="mb-4 text-[13px] leading-5 text-gray-300">
                                Boost can push audio above normal safe levels. High volume may cause permanent hearing damage,
                                especially with headphones, and can also distort or damage speakers.
                            </p>
                            <p class="mb-5 text-[12px] leading-5 text-gray-500">
                                Start low, raise volume slowly, and stop immediately if audio feels painful or distorted.
                            </p>
                            <div class="flex justify-end gap-2">
                                <button class="rounded-full border border-white/10 px-4 py-1.5 text-[12px] text-gray-300 hover:bg-white/5"
                                        onClick=${function(e) {
                                            e.stopPropagation();
                                            setShowBoostWarning(false);
                                        }}>
                                    Cancel
                                </button>
                                <button class="theme-outline-btn rounded-full border px-4 py-1.5 text-[12px] font-semibold"
                                        onClick=${function(e) {
                                            e.stopPropagation();
                                            acceptBoostWarning();
                                        }}>
                                    I understand, enable Boost
                                </button>
                            </div>
                        </div>
                    </div>
                `}
            </div>
        `;
    }

    // ── App (Root Component) ────────────────────────────────────

    function App() {
        // --- State ---
        var trackInit = {
            title: '', artist: '', albumArt: '',
            duration: 0, currentTime: 0, paused: true,
            shuffle: false, repeat: 'off', likeStatus: false,
        };
        var _track = useState(trackInit);       var track = _track[0];       var setTrack = _track[1];
        var _sa    = useState(false);            var serviceActive = _sa[0];  var setServiceActive = _sa[1];
        var _as    = useState(null);             var activeService = _as[0];   var setActiveService = _as[1];
        var _pv    = useState(false);            var playerVisible = _pv[0];  var setPlayerVisible = _pv[1];
        var _vol   = useState(100);              var volume = _vol[0];        var setVolume = _vol[1];
        var _boost = useState(false);            var boostEnabled = _boost[0]; var setBoostEnabled = _boost[1];
        var _vp    = useState(false);            var showVolumePopup = _vp[0]; var setShowVolumePopup = _vp[1];
        var _url   = useState(false);            var showUrlModal = _url[0];  var setShowUrlModal = _url[1];
        var _ts    = useState(false);            var topSearchVisible = _ts[0]; var setTopSearchVisible = _ts[1];
        var _tb    = useState({});               var toolbarButtons = _tb[0]; var setToolbarButtons = _tb[1];
        var _theme = useState(normalizeShellTheme()); var shellTheme = _theme[0]; var setShellTheme = _theme[1];
        var _nm    = useState(new URLSearchParams(window.location.search).get('native') === '1'); var nativeMode = _nm[0]; var setNativeMode = _nm[1];
        var _drag  = useState(false);            var isDragging = _drag[0];   var setIsDragging = _drag[1];
        var _dragT = useState(0);                var dragTime = _dragT[0];    var setDragTime = _dragT[1];

        // --- Refs ---
        var isDraggingRef = useRef(false);
        var serviceActiveRef = useRef(false);
        var durationRef = useRef(0);
        var progressBarRef = useRef(null);

        // Keep refs in sync
        useEffect(function() { isDraggingRef.current = isDragging; }, [isDragging]);
        useEffect(function() { serviceActiveRef.current = serviceActive; }, [serviceActive]);
        useEffect(function() { durationRef.current = track.duration; }, [track.duration]);
        useEffect(function() { applyShellTheme(shellTheme); }, [shellTheme.accent, shellTheme.surface]);

        // --- IPC Event Subscriptions (Electron mode) ---
        useEffect(function() {
            if (!window.api) return;

            // Track updates from main process
            window.api.onVkTrackUpdate(function(info) {
                setTrack(function(prev) {
                    var has = function(key) { return info[key] !== undefined && info[key] !== null; };
                    var trackChanged = has('title') && info.title !== prev.title;
                    return {
                        title:       has('title') ? info.title : prev.title,
                        artist:      has('artist') ? info.artist : (trackChanged ? '' : prev.artist),
                        albumArt:    has('albumArt') ? info.albumArt : (trackChanged ? '' : prev.albumArt),
                        paused:      has('paused') ? info.paused : prev.paused,
                        duration:    has('duration') ? info.duration : (trackChanged ? 0 : prev.duration),
                        currentTime: isDraggingRef.current ? prev.currentTime : (has('currentTime') ? info.currentTime : (trackChanged ? 0 : prev.currentTime)),
                        shuffle:     has('shuffle') ? info.shuffle : prev.shuffle,
                        repeat:      has('repeat') ? info.repeat : prev.repeat,
                        likeStatus:  has('likeStatus') ? info.likeStatus : prev.likeStatus,
                    };
                });
            });

            // Service activation
            window.api.onServiceActive(function(active) {
                setServiceActive(active);
                if (!active) {
                    setActiveService(null);
                    setPlayerVisible(false);
                    setTrack(trackInit);
                }
            });

            if (window.api.onActiveServiceChanged) {
                window.api.onActiveServiceChanged(function(service) {
                    setActiveService(service || null);
                });
            }

            // VK Player visibility
            if (window.api.onVkPlayerVisibility) {
                window.api.onVkPlayerVisibility(function(visible) {
                    setPlayerVisible(visible);
                });
            }

            // Volume sync
            if (window.api.onVolumeChanged) {
                window.api.onVolumeChanged(function(gain) {
                    setVolume(Math.round(gain * 100));
                });
            }

            if (window.api.onBoostChanged) {
                window.api.onBoostChanged(function(enabled) {
                    setBoostEnabled(!!enabled);
                });
            }

            // Search bar visibility
            if (window.api.onTopBarSearchVisibility) {
                window.api.onTopBarSearchVisibility(function(vis) {
                    setTopSearchVisible(vis);
                });
            }

            if (window.api.onToolbarButtonsChanged) {
                window.api.onToolbarButtonsChanged(function(buttons) {
                    setToolbarButtons(buttons || {});
                });
            }

            var removeThemeListener = null;
            if (window.api.onShellThemeChanged) {
                removeThemeListener = window.api.onShellThemeChanged(function(theme) {
                    setShellTheme(normalizeShellTheme(theme));
                });
            }

            // Update status notifications
            if (window.api.onUpdateStatus) {
                window.api.onUpdateStatus(function(status) {
                    console.log('[Spice] Update status:', status);
                });
            }
            return function() {
                if (removeThemeListener) removeThemeListener();
            };
        }, []);

        // --- Initial Settings Load ---
        useEffect(function() {
            (async function() {
                // Load initial volume
                var vol = await callApi('getVolume');
                if (vol !== null && vol !== undefined) {
                    setVolume(Math.round((typeof vol === 'number' ? vol : 1) * 100));
                }

                // Check search bar visibility
                var searchVis = await callApi('getTopBarSearch');
                if (searchVis === true) setTopSearchVisible(true);

                if (window.api && window.api.getSettings) {
                    var settings = await window.api.getSettings();
                    setToolbarButtons((settings && settings.toolbarButtons) || {});
                    setNativeMode(!!(settings && settings.nativeMode));
                    setBoostEnabled(!!(settings && settings.boostEnabled));
                    setShellTheme(normalizeShellTheme(settings && settings.shellTheme));
                }
            })();
        }, []);

        // --- Browser Polling (non-Electron fallback) ---
        useEffect(function() {
            if (window.api) return;

            var id = setInterval(async function() {
                try {
                    var res = await fetch('/api/status');
                    var state = await res.json();
                    if (state && state.track) {
                        setTrack({
                            title:       state.track.title || '',
                            artist:      state.track.artist || '',
                            albumArt:    state.track.art || '',
                            paused:      !!state.paused,
                            currentTime: state.currentTime || 0,
                            duration:    state.track.duration || 0,
                            shuffle:     !!state.shuffle,
                            repeat:      state.repeat || 'off',
                            likeStatus:  !!state.likeStatus,
                        });
                        setServiceActive(true);
                        setActiveService('yt');
                        setPlayerVisible(true);
                    }
                } catch (e) { /* polling failed, ignore */ }
            }, 1000);

            return function() { clearInterval(id); };
        }, []);

        // --- Progress Bar Drag Logic ---
        useEffect(function() {
            function onMouseMove(e) {
                if (!isDraggingRef.current) return;
                var bars = document.querySelectorAll('#vk-player-bar .group');
                var bar = bars[0];
                if (!bar) return;
                var rect = bar.getBoundingClientRect();
                var pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                setDragTime(pct * durationRef.current);
            }

            function onMouseUp(e) {
                if (!isDraggingRef.current) return;
                isDraggingRef.current = false;
                setIsDragging(false);
                var bars = document.querySelectorAll('#vk-player-bar .group');
                var bar = bars[0];
                if (bar && durationRef.current > 0) {
                    var rect = bar.getBoundingClientRect();
                    var pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                    var seekTime = pct * durationRef.current;
                    callApi('vkCommand', { action: 'seek', time: seekTime });
                }
            }

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
            return function() {
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            };
        }, []);

        var handleDragStart = useCallback(function(e) {
            if (!track.duration || track.duration <= 0) return;
            isDraggingRef.current = true;
            setIsDragging(true);
            // Calculate initial drag position
            var bar = e.currentTarget;
            var rect = bar.getBoundingClientRect();
            var pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            setDragTime(pct * track.duration);
        }, [track.duration]);

        // --- URL Modal Handlers ---
        function openUrlModal() {
            callApi('hideView');
            setShowUrlModal(true);
        }
        function closeUrlModal() {
            setShowUrlModal(false);
            callApi('showView');
        }

        // --- Service Load Handler ---
        var handleLoadService = useCallback(function(service) {
            callApi('loadService', service);
            if (!window.api) {
                setServiceActive(true);
                setActiveService(service);
                setPlayerVisible(true);
            }
        }, []);

        // --- Render ---
        return html`
            <div class="spice-shell flex flex-col h-screen text-white font-sans overflow-hidden">

                <${TitleBar}
                    volume=${volume}
                    setVolume=${setVolume}
                    boostEnabled=${boostEnabled}
                    setBoostEnabled=${setBoostEnabled}
                    showVolumePopup=${showVolumePopup}
                    setShowVolumePopup=${setShowVolumePopup}
                    topSearchVisible=${topSearchVisible}
                    toolbarButtons=${toolbarButtons}
                    nativeMode=${nativeMode}
                    activeService=${activeService}
                    onOpenUrlModal=${openUrlModal}
                />

                ${playerVisible && html`
                    <${PlayerBar}
                        track=${track}
                        isDragging=${isDragging}
                        dragTime=${dragTime}
                        onDragStart=${handleDragStart}
                    />
                `}

                ${!serviceActive && html`
                    <${HomeScreen} onLoad=${handleLoadService} nativeMode=${nativeMode} />
                `}

                ${showUrlModal && html`
                    <${URLModal} onClose=${closeUrlModal} />
                `}
            </div>
        `;
    }

    // ── Mount ────────────────────────────────────────────────────
    var root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(html`<${App} />`);

    </script>
</body>
</html>
